<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .swagger-ui {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin: 20px;
      padding: 20px;
    }
    .swagger-ui .topbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px 12px 0 0;
    }
    .swagger-ui .info {
      margin: 20px 0;
    }
    .swagger-ui .info .title {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
    }
    .swagger-ui .opblock {
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .swagger-ui .opblock .opblock-summary {
      border-radius: 8px;
    }
    .swagger-ui .opblock .opblock-summary-description {
      font-size: 14px;
    }
    .swagger-ui .btn {
      border-radius: 6px;
      font-weight: 500;
    }
    .swagger-ui .parameters th,
    .swagger-ui .parameters td {
      padding: 12px;
    }
    .swagger-ui .model-box {
      background: #f8f9fa;
      border-radius: 6px;
    }
    .swagger-ui .scheme-container {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
    }
    .swagger-ui .loading-container {
      padding: 40px;
    }
    .swagger-ui .response-col-status {
      font-weight: 600;
    }
    .swagger-ui .tab li:first-child {
      padding-left: 0;
    }
    .swagger-ui .tab li {
      padding: 0 10px;
    }
    .swagger-ui .execute-wrapper {
      padding: 10px 0;
    }
    .custom-header {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin: 20px;
      padding: 30px;
    }
    .custom-header h1 {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="custom-header">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-8">
          <h1 class="display-4">IdentityNet API</h1>
          <p class="lead text-muted">Decentralized Identity & Reputation System</p>
        </div>
        <div class="col-md-4 text-end">
          <a href="/" class="btn btn-primary btn-lg me-2">Home</a>
          <a href="/docs" class="btn btn-outline-primary btn-lg">Docs</a>
        </div>
      </div>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const ui = SwaggerUIBundle({
      url: "{{ openapi_url }}",
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "StandaloneLayout",
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      docExpansion: "list",
      filter: true,
      showRequestHeaders: true,
      tryItOutEnabled: true,
      persistAuthorization: true,
      syntaxHighlight: {
        activate: true,
        theme: "monokai"
      }
    });
  </script>
</body>
</html>
